name: Local Testing & Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn joblib pytest pytest-cov
      
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
      
      - name: Test training script locally
        run: |
          python src/train.py
      
      - name: Verify model artifact
        run: |
          if [ -f models/model.pkl ]; then
            echo "✅ Model artifact created successfully"
          else
            echo "❌ Model artifact not found"
            exit 1
          fi
