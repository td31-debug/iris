name: Deploy Model to Azure ML

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, releases/** ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/releases/') || startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 45
    env:
      PYTHON_VERSION: '3.10'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v

      - name: Train model locally for deployment
        env:
          MLFLOW_TRACKING_URI: ./mlruns
        run: |
          python src/train.py

      - name: Verify trained model artifact
        run: |
          test -f models/model.pkl

      - name: Check Azure configuration
        id: azure_config
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_WORKSPACE_NAME: ${{ secrets.AZURE_WORKSPACE_NAME }}
        run: |
          if [ -n "$AZURE_CREDENTIALS" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ] && [ -n "$AZURE_RESOURCE_GROUP" ] && [ -n "$AZURE_WORKSPACE_NAME" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Azure deployment requires AZURE_CREDENTIALS, AZURE_SUBSCRIPTION_ID, AZURE_RESOURCE_GROUP, and AZURE_WORKSPACE_NAME secrets."
          fi

      - name: Azure Login
        id: azure_login
        if: steps.azure_config.outputs.ready == 'true'
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: Verify Azure ML workspace
        id: verify_workspace
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome == 'success'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension remove -n azure-cli-ml || true
            az extension add -n ml -y || az extension update -n ml
            az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            az ml workspace show \
              --name "${{ secrets.AZURE_WORKSPACE_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --output table
        continue-on-error: true

      - name: Register model in Azure ML
        id: register_model
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome == 'success' && steps.verify_workspace.outcome == 'success'
        run: |
          python src/register_model.py --name iris-classifier --version 1 --model-path models/model.pkl
        continue-on-error: true

      - name: Verify registered model
        id: verify_model
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome == 'success' && steps.verify_workspace.outcome == 'success' && steps.register_model.outcome == 'success'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension remove -n azure-cli-ml || true
            az extension add -n ml -y || az extension update -n ml
            az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            az ml model show \
              --name iris-classifier \
              --version 1 \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --workspace-name "${{ secrets.AZURE_WORKSPACE_NAME }}" \
              --output table
        continue-on-error: true
      
      - name: Deploy managed online endpoint
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome == 'success' && steps.verify_workspace.outcome == 'success' && steps.register_model.outcome == 'success' && steps.verify_model.outcome == 'success'
        run: |
          python src/deploy_azure_endpoint.py --model-name iris-classifier --model-version 1 --endpoint-name iris-online-endpoint --deployment-name blue
        continue-on-error: true

      - name: Print Azure deployment skip reason
        if: steps.azure_config.outputs.ready != 'true'
        run: |
          echo "Azure deployment skipped because one or more GitHub repository secrets are missing."

      - name: Print Azure login warning
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome != 'success'
        run: |
          echo "Azure login failed on the GitHub runner. Local validation passed, but cloud deployment was skipped."

      - name: Print Azure workspace warning
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome == 'success' && steps.verify_workspace.outcome != 'success'
        run: |
          echo "Azure workspace verification failed on the GitHub runner. Local validation passed, but cloud deployment was skipped."

      - name: Print Azure deploy warning
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome == 'success' && steps.verify_workspace.outcome == 'success' && (steps.register_model.outcome != 'success' || steps.verify_model.outcome != 'success')
        run: |
          echo "Azure model registration or verification failed on the GitHub runner. Local validation passed, but endpoint deployment was skipped."
