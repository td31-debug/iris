name: Deploy Model to Azure ML

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 45
    env:
      PYTHON_VERSION: '3.10'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v

      - name: Train model locally for deployment
        env:
          MLFLOW_TRACKING_URI: ./mlruns
        run: |
          python src/train.py

      - name: Verify trained model artifact
        run: |
          test -f models/model.pkl

      - name: Check Azure configuration
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_WORKSPACE_NAME: ${{ secrets.AZURE_WORKSPACE_NAME }}
        run: |
          if [ -z "$AZURE_CREDENTIALS" ] || [ -z "$AZURE_SUBSCRIPTION_ID" ] || [ -z "$AZURE_RESOURCE_GROUP" ] || [ -z "$AZURE_WORKSPACE_NAME" ]; then
            echo "Azure deployment requires AZURE_CREDENTIALS, AZURE_SUBSCRIPTION_ID, AZURE_RESOURCE_GROUP, and AZURE_WORKSPACE_NAME secrets."
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure ML workspace
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension remove -n azure-cli-ml || true
            az extension add -n ml -y || az extension update -n ml
            az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            az ml workspace show \
              --name "${{ secrets.AZURE_WORKSPACE_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --output table

      - name: Register model in Azure ML
        run: |
          python src/register_model.py --name iris-classifier --version 1 --model-path models/model.pkl

      - name: Verify registered model
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension remove -n azure-cli-ml || true
            az extension add -n ml -y || az extension update -n ml
            az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            az ml model show \
              --name iris-classifier \
              --version 1 \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --workspace-name "${{ secrets.AZURE_WORKSPACE_NAME }}" \
              --output table
      
      - name: Deploy managed online endpoint
        run: |
          python src/deploy_azure_endpoint.py --model-name iris-classifier --model-version 1 --endpoint-name iris-online-endpoint --deployment-name blue
