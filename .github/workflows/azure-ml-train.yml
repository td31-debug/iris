name: Azure ML Training Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

# Trigger conditions
on:
  push:
    branches: [ main, develop, releases/** ]
  pull_request:
    branches: [ main, releases/** ]
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHON_VERSION: '3.10'
    
    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v5
      
      # Step 2: Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Check Azure prerequisites
      - name: Check Azure configuration
        id: azure_config
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_WORKSPACE_NAME: ${{ secrets.AZURE_WORKSPACE_NAME }}
        run: |
          if [ -n "$AZURE_CREDENTIALS" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ] && [ -n "$AZURE_RESOURCE_GROUP" ] && [ -n "$AZURE_WORKSPACE_NAME" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Azure secrets are incomplete; Azure ML submission will be skipped."
          fi
      
      # Step 5: Authenticate with Azure
      - name: Azure Login
        id: azure_login
        uses: azure/login@v3
        if: steps.azure_config.outputs.ready == 'true'
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      # Step 6: Verify Azure ML workspace with Azure CLI
      - name: Verify Azure ML workspace
        id: verify_workspace
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome == 'success'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension remove -n azure-cli-ml || true
            az extension add -n ml -y || az extension update -n ml
            az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            az ml workspace show \
              --name "${{ secrets.AZURE_WORKSPACE_NAME }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --output table
        continue-on-error: true
      
      # Step 7: Run local tests
      - name: Run tests
        run: |
          python -m pytest tests/ -v
      
      # Step 8: Train locally (optional - for quick validation)
      - name: Train model locally
        env:
          MLFLOW_TRACKING_URI: ./mlruns
        run: |
          set -e
          python src/train.py
        continue-on-error: false
      
      # Step 9: Upload model artifact
      - name: Verify local model artifact
        run: |
          test -f models/model.pkl

      - name: Upload model artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trained-model
          path: models/model.pkl
        continue-on-error: true
      
      # Step 10: Submit job to Azure ML
      - name: Submit Azure ML Job
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome == 'success' && steps.verify_workspace.outcome == 'success'
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_WORKSPACE_NAME: ${{ secrets.AZURE_WORKSPACE_NAME }}
        run: |
          python src/job.py
        continue-on-error: true

      - name: Print Azure secret requirements
        if: steps.azure_config.outputs.ready != 'true'
        run: |
          echo "Azure ML submission skipped. Configure these repository secrets:" \
            "AZURE_CREDENTIALS, AZURE_SUBSCRIPTION_ID, AZURE_RESOURCE_GROUP, AZURE_WORKSPACE_NAME"

      - name: Print Azure login warning
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome != 'success'
        run: |
          echo "Azure login failed on the GitHub runner. Local validation passed, but Azure ML submission was skipped."

      - name: Print Azure workspace warning
        if: steps.azure_config.outputs.ready == 'true' && steps.azure_login.outcome == 'success' && steps.verify_workspace.outcome != 'success'
        run: |
          echo "Azure workspace verification failed on the GitHub runner. Local validation passed, but Azure ML submission was skipped."
      
      # Step 11: Notify on success
      - name: Notify Success
        if: success()
        run: echo "✅ Training pipeline completed successfully!"
      
      # Step 12: Notify on failure
      - name: Notify Failure
        if: failure()
        run: echo "❌ Training pipeline failed!"
